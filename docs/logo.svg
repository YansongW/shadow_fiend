<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7c59f"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ff6b35" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.8"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4"/>

  <!-- Abstract Shadow Fiend silhouette / subtitle wave -->
  <path d="M156 256 Q206 156 256 256 Q306 356 356 256" fill="none" stroke="url(#glow)" stroke-width="24" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M196 296 Q256 196 316 296" fill="none" stroke="#f7c59f" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

  <!-- SF monogram -->
  <text x="256" y="380" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#f7c59f" text-anchor="middle" letter-spacing="-2">SF</text>

  <!-- Subtitle dots -->
  <circle cx="196" cy="416" r="8" fill="#ff6b35" opacity="0.8"/>
  <circle cx="256" cy="416" r="8" fill="#f7c59f" opacity="0.9"/>
  <circle cx="316" cy="416" r="8" fill="#ff6b35" opacity="0.8"/>
</svg>