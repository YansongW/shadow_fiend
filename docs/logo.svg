<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>
    <radialGradient id="soulGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2a6d"/>
      <stop offset="55%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#10002b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff0054" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#390099" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d0221" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>

  <!-- floating soul orbs -->
  <g fill="#ff0054" opacity="0.85" filter="url(#glow)">
    <circle cx="120" cy="140" r="5"/>
    <circle cx="390" cy="120" r="6"/>
    <circle cx="420" cy="260" r="4"/>
    <circle cx="100" cy="290" r="5"/>
    <circle cx="380" cy="380" r="5"/>
    <circle cx="150" cy="400" r="4"/>
  </g>

  <!-- back soul flames -->
  <g transform="translate(256,256)" opacity="0.7">
    <path d="M-120 80 Q-160 -40 -110 -160 Q-80 -60 -70 80 Z" fill="url(#flame)"/>
    <path d="M120 80 Q160 -40 110 -160 Q80 -60 70 80 Z" fill="url(#flame)"/>
    <path d="M0 90 Q-40 -80 0 -180 Q40 -80 0 90 Z" fill="url(#flame)"/>
    <path d="M-70 85 Q-110 -30 -80 -130 Q-50 -40 -40 85 Z" fill="url(#flame)"/>
    <path d="M70 85 Q110 -30 80 -130 Q50 -40 40 85 Z" fill="url(#flame)"/>
  </g>

  <!-- Shadow Fiend silhouette -->
  <g transform="translate(256,280)" fill="#05030a" stroke="#2a0a3b" stroke-width="2">
    <!-- horns -->
    <path d="M-55 -115 L-95 -175 L-50 -125 Z" fill="#120418"/>
    <path d="M55 -115 L95 -175 L50 -125 Z" fill="#120418"/>
    <path d="M-35 -120 L-60 -165 L-28 -128 Z" fill="#1b0624"/>
    <path d="M35 -120 L60 -165 L28 -128 Z" fill="#1b0624"/>

    <!-- head and cowl -->
    <path d="M-48 -115 C-58 -95 -55 -55 -35 -45 C0 -35 35 -45 35 -45 C55 -55 58 -95 48 -115 C30 -135 -30 -135 -48 -115 Z"/>

    <!-- shoulders and torso -->
    <path d="M-40 -45 C-90 -35 -140 10 -155 80 C-140 95 -100 85 -80 70 C-95 120 -110 180 -85 220 L85 220 C110 180 95 120 80 70 C100 85 140 95 155 80 C140 10 90 -35 40 -45 Z"/>

    <!-- raised claw arms -->
    <path d="M-130 35 C-170 20 -190 -10 -185 -45 C-180 -20 -165 5 -145 15 C-165 5 -185 -15 -195 -55 C-185 -35 -165 -10 -140 5 C-160 -20 -175 -55 -165 -90 C-155 -60 -145 -30 -125 5 Z" fill="#080210"/>
    <path d="M130 35 C170 20 190 -10 185 -45 C180 -20 165 5 145 15 C165 5 185 -15 195 -55 C185 -35 165 -10 140 5 C160 -20 175 -55 165 -90 C155 -60 145 -30 125 5 Z" fill="#080210"/>
  </g>

  <!-- central soul orb -->
  <circle cx="256" cy="280" r="42" fill="url(#soulGlow)" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="22" fill="#ff0054" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="8" fill="#ffe66d"/>

  <!-- glowing eyes -->
  <g fill="#ff0054" filter="url(#glow)">
    <ellipse cx="242" cy="230" rx="7" ry="4"/>
    <ellipse cx="270" cy="230" rx="7" ry="4"/>
  </g>

  <!-- small soul wisps rising -->
  <g fill="none" stroke="#ff0054" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <path d="M200 330 Q190 290 210 260"/>
    <path d="M312 330 Q322 290 302 260"/>
    <path d="M256 340 Q256 300 256 270"/>
  </g>
</svg>