version: "3.8"

services:
  shadow_fiend_test:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: shadow_fiend:test
    container_name: shadow_fiend_test
    environment:
      - PYTHONPATH=/app/src
      - NO_COLOR=1
    command: ["python", "scripts/test_runner.py", "test", "--headless"]
